<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản</title>
    <link rel="stylesheet" href="../css/register.css">
</head>
<body>
    <div class="form-container">
        <h1>Đăng ký tài khoản</h1>
        <p class="subtitle">Đăng ký tài khoản để sử dụng dịch vụ</p>

        <form id="form-submit">
            <div class="name-row">
                <div class="form-group">
                    <label for="fmname">Họ và tên đệm</label>
                    <input type="text" id="fmame" >
                    <span class="error" id="fname-error">Vui lòng nhập họ và tên đệm</span>
                </div>
                <div class="form-group">
                    <label for="name">Tên</label>
                    <input type="text" id="name">
                    <span class="error" id="name-error">Vui lòng nhập tên </span>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@company.com">
                <span class="error" id="email-error">Vui lòng nhập Email</span>
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password">
                <span class="error" id="password-error">Mật khẩu phải chứa ít nhất 8 kí tự</span>
            </div>

            <div class="form-group">
                <label for="confirm-password">Xác nhận mật khẩu</label>
                <input type="password" id="confirm-password">
                <span class="error" id="confirm-error">Nhập lại mật khẩu</span>
            </div>

            <div class="checkbox-container">
                <input type="checkbox" id="agree" >
                <label for="agree">
                    Bạn đồng ý với 
                    <a href="#">chính sách và điều khoản</a>
                </label>
                <span class="error" id="check-error">Xác nhận đồng ý với chính sách</span>
            </div>

            <a href="../pages/index.html"><button type="submit">Đăng ký</button></a>
        </form>

        <div class="login-link">
            Bạn đã có tài khoản? 
            <a href="./login.html">Đăng nhập</a>
        </div>
    </div>
    <script src="../js/register.js"></script>
</body>
</html>
